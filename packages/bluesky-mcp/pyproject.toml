[project]
name = "bluesky-mcp"
version = "0.1.0"
description = "MCP server for Bluesky"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["mcp", "atproto", "attribution-schema>=0.1.0", "attribution-cache>=0.1.0"]

[project.scripts]
bluesky-mcp = "bluesky_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bluesky_mcp"]

[tool.uv.sources]
attribution-schema = { workspace = true }
attribution-cache = { workspace = true }
