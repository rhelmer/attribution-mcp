[project]
name = "mastodon-mcp"
version = "0.1.0"
description = "MCP server for Mastodon"
requires-python = ">=3.10"
dependencies = ["mcp", "mastodon.py", "attribution-schema>=0.1.0", "attribution-cache>=0.1.0"]

[project.scripts]
mastodon-mcp = "mastodon_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mastodon_mcp"]

[tool.uv.sources]
attribution-schema = { workspace = true }
attribution-cache = { workspace = true }
