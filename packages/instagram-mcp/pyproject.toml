[project]
name = "instagram-mcp"
version = "0.1.0"
description = "MCP server for Instagram/Threads"
requires-python = ">=3.8"
dependencies = ["mcp", "requests", "facebook-sdk", "attribution-schema>=0.1.0", "attribution-cache>=0.1.0"]

[project.scripts]
instagram-mcp = "instagram_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/instagram_mcp"]
