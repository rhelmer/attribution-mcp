[project]
name = "linkedin-mcp"
version = "0.1.0"
description = "MCP server for LinkedIn"
requires-python = ">=3.10"
dependencies = ["mcp", "requests", "requests-oauthlib", "attribution-schema>=0.1.0", "attribution-cache>=0.1.0"]

[project.scripts]
linkedin-mcp = "linkedin_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/linkedin_mcp"]

[tool.uv.sources]
attribution-schema = { workspace = true }
attribution-cache = { workspace = true }
