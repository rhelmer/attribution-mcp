[project]
name = "gsc-mcp"
version = "0.1.0"
description = "MCP server for Google Search Console"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["mcp", "google-api-python-client", "google-auth", "attribution-schema>=0.1.0", "attribution-cache>=0.1.0"]
[project.scripts]
gsc-mcp = "gsc_mcp.server:main"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["src/gsc_mcp"]

[tool.uv.sources]
attribution-schema = { workspace = true }
attribution-cache = { workspace = true }
