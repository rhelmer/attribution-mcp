[project]
name = "youtube-mcp"
version = "0.1.0"
description = "MCP server for YouTube Analytics"
requires-python = ">=3.10"
dependencies = ["mcp", "google-api-python-client", "google-auth", "attribution-schema>=0.1.0"]
[project.scripts]
youtube-mcp = "youtube_mcp.server:main"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["src/youtube_mcp"]

[tool.uv.sources]
attribution-schema = { workspace = true }
