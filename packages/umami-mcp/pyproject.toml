[project]
name = "umami-mcp"
version = "0.1.0"
description = "MCP server for Umami Analytics"
requires-python = ">=3.8"
dependencies = ["mcp", "httpx", "attribution-schema>=0.1.0"]
[project.scripts]
umami-mcp = "umami_mcp.server:main"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["src/umami_mcp"]
